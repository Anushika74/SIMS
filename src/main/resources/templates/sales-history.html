<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Sales History')}"></head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/common :: sidebar('sales')}"></aside>
    <main class="main">
        <nav th:replace="~{fragments/common :: topbar('Sales History')}"></nav>
        <div class="content">

            <div class="card mb-3">
                <div class="card-body">
                    <form class="row g-2 align-items-end" th:action="@{/sales/history}" method="get">
                        <div class="col-auto">
                            <label class="form-label small">From</label>
                            <input type="date" name="from" th:value="${from}" class="form-control">
                        </div>
                        <div class="col-auto">
                            <label class="form-label small">To</label>
                            <input type="date" name="to" th:value="${to}" class="form-control">
                        </div>
                        <div class="col-auto">
                            <button class="btn btn-primary"><i class="bi bi-funnel"></i> Filter</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr><th>Invoice</th><th>Date</th><th>Cashier</th><th>Payment</th><th class="text-center">Items</th><th class="text-end">Total</th></tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(sales)}"><td colspan="6" class="text-center text-muted py-4">No sales in this period.</td></tr>
                            <tr th:each="s : ${sales}">
                                <td><a th:href="@{'/sales/invoice/' + ${s.id}}" th:text="${s.invoiceNo}">INV</a></td>
                                <td th:text="${#temporals.format(s.saleDate,'dd MMM yyyy HH:mm')}">date</td>
                                <td th:text="${s.cashier}">staff</td>
                                <td th:text="${s.paymentMethod}">CASH</td>
                                <td class="text-center" th:text="${#lists.size(s.items)}">0</td>
                                <td class="text-end" th:text="${#numbers.formatDecimal(s.totalAmount,0,'COMMA',2,'POINT')}">0</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>
</div>
<th:block th:replace="~{fragments/common :: scripts}"></th:block>
</body>
</html>
