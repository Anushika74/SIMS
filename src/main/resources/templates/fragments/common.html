<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ============ HEAD ============ -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' · Smart Inventory'">Smart Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>

<body>

<!-- ============ SIDEBAR ============ -->
<aside th:fragment="sidebar(active)" class="sidebar">
    <div class="brand">
        <i class="bi bi-box-seam-fill"></i> Smart Inventory
    </div>
    <nav class="nav flex-column py-2">
        <div class="nav-section">Main</div>
        <a class="nav-link" th:classappend="${active=='dashboard'} ? 'active'" th:href="@{/dashboard}">
            <i class="bi bi-speedometer2"></i> Dashboard</a>

        <div class="nav-section">Operations</div>
        <a class="nav-link" th:classappend="${active=='products'} ? 'active'" th:href="@{/products}">
            <i class="bi bi-tags"></i> Products</a>
        <a class="nav-link" th:classappend="${active=='inventory'} ? 'active'" th:href="@{/inventory}">
            <i class="bi bi-boxes"></i> Inventory</a>
        <a class="nav-link" th:classappend="${active=='sales'} ? 'active'" th:href="@{/sales}">
            <i class="bi bi-cart-check"></i> Sales</a>

        <div class="nav-section">Insights</div>
        <a class="nav-link" th:classappend="${active=='reports'} ? 'active'" th:href="@{/reports}">
            <i class="bi bi-bar-chart-line"></i> Reports</a>
        <a class="nav-link" th:classappend="${active=='ai-insights'} ? 'active'" th:href="@{/ai/insights}">
            <i class="bi bi-robot"></i> AI Insights</a>
        <a class="nav-link" th:classappend="${active=='ai-analytics'} ? 'active'" th:href="@{/ai/analytics}">
            <i class="bi bi-graph-up-arrow"></i> Prediction &amp; Analytics</a>
    </nav>
</aside>

<!-- ============ TOPBAR ============ -->
<nav th:fragment="topbar(title)" class="topbar">
    <h5 class="mb-0 fw-semibold" th:text="${title}">Page</h5>
    <div class="d-flex align-items-center gap-3">
        <span class="text-muted small">
            <i class="bi bi-person-circle"></i>
            <span th:text="${currentUsername}">user</span>
            <span class="badge bg-secondary ms-1" th:text="${isAdmin} ? 'ADMIN' : 'STAFF'">ROLE</span>
        </span>
        <form th:action="@{/logout}" method="post" class="m-0">
            <button class="btn btn-sm btn-outline-danger" type="submit">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </form>
    </div>
</nav>

<!-- ============ SCRIPTS ============ -->
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</th:block>

</body>
</html>
