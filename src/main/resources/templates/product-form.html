<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Product Form')}"></head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/common :: sidebar('products')}"></aside>
    <main class="main">
        <nav th:replace="~{fragments/common :: topbar('Product Details')}"></nav>
        <div class="content">
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-box"></i>
                    <span th:text="${product.id != null} ? 'Edit Product' : 'Add New Product'">Product</span>
                </div>
                <div class="card-body">
                    <form th:action="@{/products/save}" method="post" th:object="${product}">
                        <input type="hidden" th:field="*{id}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">SKU / Barcode</label>
                                <input class="form-control" th:field="*{sku}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Product Name</label>
                                <input class="form-control" th:field="*{name}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Category</label>
                                <select class="form-select" name="categoryId">
                                    <option value="">— Select —</option>
                                    <option th:each="c : ${categories}" th:value="${c.id}"
                                            th:text="${c.name}"
                                            th:selected="${product.category != null and product.category.id == c.id}">Cat</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Supplier</label>
                                <input class="form-control" th:field="*{supplier}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Selling Price <span th:text="'(' + ${currency} + ')'">()</span></label>
                                <input type="number" step="0.01" min="0" class="form-control" th:field="*{unitPrice}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Cost Price <span th:text="'(' + ${currency} + ')'">()</span></label>
                                <input type="number" step="0.01" min="0" class="form-control" th:field="*{costPrice}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Stock Quantity</label>
                                <input type="number" min="0" class="form-control" th:field="*{quantity}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Reorder Level</label>
                                <input type="number" min="0" class="form-control" th:field="*{reorderLevel}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Expiry Date <span class="text-muted">(optional)</span></label>
                                <input type="date" class="form-control" th:field="*{expiryDate}">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" rows="2" th:field="*{description}"></textarea>
                            </div>
                        </div>
                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save</button>
                            <a th:href="@{/products}" class="btn btn-light">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card mt-3">
                <div class="card-header"><i class="bi bi-upc-scan"></i> Product Barcode</div>
                <div class="card-body text-center">
                    <svg id="barcode"></svg>
                    <div class="mt-2 no-print">
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="printBarcode()">
                            <i class="bi bi-printer"></i> Print Barcode
                        </button>
                    </div>
                    <div class="form-text">This barcode encodes the product's SKU. Print it, stick it on the
                        product, and scan it on the Sales page to add the item.</div>
                </div>
            </div>
        </div>
    </main>
</div>
<th:block th:replace="~{fragments/common :: scripts}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script>
    function renderBarcode() {
        const skuEl = document.getElementById('sku');
        const svg = document.getElementById('barcode');
        const code = skuEl ? skuEl.value.trim() : '';
        if (!code) { svg.innerHTML = ''; return; }
        try { JsBarcode('#barcode', code, { format: 'CODE128', displayValue: true, height: 60, fontSize: 14 }); }
        catch (e) { svg.innerHTML = ''; }
    }
    function printBarcode() {
        const code = (document.getElementById('sku') || {}).value || '';
        if (!code) { alert('Enter a SKU first.'); return; }
        const svg = document.getElementById('barcode').outerHTML;
        const w = window.open('', '_blank');
        w.document.write('<html><head><title>Barcode ' + code + '</title></head>' +
            '<body style="text-align:center;margin-top:60px">' + svg + '</body></html>');
        w.document.close(); w.focus(); w.print();
    }
    document.addEventListener('DOMContentLoaded', () => {
        renderBarcode();
        const skuEl = document.getElementById('sku');
        if (skuEl) skuEl.addEventListener('input', renderBarcode);
    });
</script>
</body>
</html>
