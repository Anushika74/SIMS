<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Reports')}"></head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/common :: sidebar('reports')}"></aside>
    <main class="main">
        <nav th:replace="~{fragments/common :: topbar('Reports')}"></nav>
        <div class="content">

            <!-- Report toolbar -->
            <div class="d-flex justify-content-between align-items-center mb-3 no-print">
                <h5 class="mb-0 fw-semibold"><i class="bi bi-file-earmark-bar-graph"></i> Business Reports</h5>
                <button class="btn btn-primary btn-sm" onclick="window.print()">
                    <i class="bi bi-printer"></i> Print / Save as PDF
                </button>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-lg-6">
                    <div class="card">
                        <div class="card-header"><i class="bi bi-cash-coin"></i> Revenue Analysis (Monthly)</div>
                        <div class="card-body" style="height:300px;"><canvas id="revenueChart"></canvas></div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="card">
                        <div class="card-header"><i class="bi bi-trophy"></i> Product Performance (Top Sellers)</div>
                        <div class="card-body" style="height:300px;"><canvas id="perfChart"></canvas></div>
                    </div>
                </div>
            </div>

            <ul class="nav nav-tabs no-print" role="tablist">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#daily">Daily Sales</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#monthly">Monthly Sales</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#stock">Product Stock</button></li>
            </ul>
            <div class="tab-content card border-top-0">

                <!-- Daily Sales Report -->
                <div class="tab-pane fade show active p-0" id="daily">
                    <div class="p-2 text-end no-print">
                        <button class="btn btn-sm btn-outline-success" onclick="SI.exportTableCsv('dailyTable','daily-sales-report.csv')">
                            <i class="bi bi-download"></i> Export CSV
                        </button>
                    </div>
                    <table id="dailyTable" class="table table-sm table-hover mb-0">
                        <thead class="table-light"><tr><th>Date</th><th class="text-center">Transactions</th><th class="text-end">Revenue</th></tr></thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(dailySales)}"><td colspan="3" class="text-muted small p-3">No data.</td></tr>
                            <tr th:each="d : ${dailySales}">
                                <td th:text="${d.day}">date</td>
                                <td class="text-center" th:text="${d.transactions}">0</td>
                                <td class="text-end" th:text="${currency + ' ' + #numbers.formatDecimal(d.total,0,'COMMA',2,'POINT')}">0</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Monthly Sales Report -->
                <div class="tab-pane fade p-0" id="monthly">
                    <div class="p-2 text-end no-print">
                        <button class="btn btn-sm btn-outline-success" onclick="SI.exportTableCsv('monthlyTable','monthly-sales-report.csv')">
                            <i class="bi bi-download"></i> Export CSV
                        </button>
                    </div>
                    <table id="monthlyTable" class="table table-sm table-hover mb-0">
                        <thead class="table-light"><tr><th>Month</th><th class="text-center">Transactions</th><th class="text-end">Revenue</th></tr></thead>
                        <tbody>
                            <tr th:each="m : ${monthlySales}">
                                <td th:text="${m.month}">month</td>
                                <td class="text-center" th:text="${m.transactions}">0</td>
                                <td class="text-end" th:text="${currency + ' ' + #numbers.formatDecimal(m.total,0,'COMMA',2,'POINT')}">0</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Product Stock Report -->
                <div class="tab-pane fade p-0" id="stock">
                    <div class="p-2 text-end no-print">
                        <button class="btn btn-sm btn-outline-success" onclick="SI.exportTableCsv('stockTable','product-stock-report.csv')">
                            <i class="bi bi-download"></i> Export CSV
                        </button>
                    </div>
                    <table id="stockTable" class="table table-sm table-hover mb-0">
                        <thead class="table-light"><tr><th>SKU</th><th>Product</th><th>Category</th><th class="text-center">Stock</th><th>Status</th></tr></thead>
                        <tbody>
                            <tr th:each="p : ${products}">
                                <td><code th:text="${p.sku}">SKU</code></td>
                                <td th:text="${p.name}">Name</td>
                                <td th:text="${p.category != null ? p.category.name : '—'}">Cat</td>
                                <td class="text-center" th:text="${p.quantity}">0</td>
                                <td><span class="badge" th:classappend="${p.lowStock} ? 'bg-danger' : 'bg-success'"
                                          th:text="${p.lowStock} ? 'LOW' : 'OK'">OK</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>
</div>
<th:block th:replace="~{fragments/common :: scripts}"></th:block>
<script>
    SI.fetchJson('/api/charts/revenue').then(d => SI.barChart('revenueChart', d, 'Revenue', '#16a34a', true)).catch(console.error);
    SI.fetchJson('/api/charts/product-performance?top=10').then(d => SI.barChart('perfChart', d, 'Units Sold', '#4f46e5')).catch(console.error);
</script>
</body>
</html>
