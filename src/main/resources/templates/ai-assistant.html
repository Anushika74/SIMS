<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('AI Assistant')}"></head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/common :: sidebar('ai-assistant')}"></aside>
    <main class="main">
        <nav th:replace="~{fragments/common :: topbar('AI Assistant')}"></nav>
        <div class="content">

            <div class="card mx-auto" style="max-width: 820px;">
                <div class="card-header d-flex align-items-center gap-2">
                    <i class="bi bi-robot text-primary fs-5"></i>
                    <span>Inventory Assistant</span>
                    <span class="ai-pill ms-auto"><i class="bi bi-cpu"></i> Smart Q&amp;A</span>
                </div>

                <div class="card-body">
                    <!-- Quick questions -->
                    <div class="mb-3 d-flex flex-wrap gap-2" id="chips">
                        <button class="btn btn-sm btn-outline-primary chip">What should I restock?</button>
                        <button class="btn btn-sm btn-outline-primary chip">Show low stock products</button>
                        <button class="btn btn-sm btn-outline-primary chip">What are my dead stock?</button>
                        <button class="btn btn-sm btn-outline-primary chip">Best selling products</button>
                        <button class="btn btn-sm btn-outline-primary chip">Which products are expiring?</button>
                        <button class="btn btn-sm btn-outline-primary chip">Today's revenue</button>
                        <button class="btn btn-sm btn-outline-primary chip">Sales trend</button>
                    </div>

                    <!-- Chat window -->
                    <div id="chat" style="height: 50vh; overflow-y: auto; background:#0f172a;
                         border:1px solid #334155; border-radius:12px; padding:14px;"></div>

                    <!-- Input -->
                    <div class="input-group mt-3">
                        <input id="msg" type="text" class="form-control" autocomplete="off"
                               placeholder="Ask about stock, sales, restock, trends…">
                        <button class="btn btn-primary" id="sendBtn"><i class="bi bi-send"></i> Send</button>
                    </div>
                    <div class="form-text">Tip: try "what should I restock?" or "show me the alerts".</div>
                </div>
            </div>

        </div>
    </main>
</div>

<th:block th:replace="~{fragments/common :: scripts}"></th:block>
<style>
    .bubble { max-width: 80%; padding: 10px 14px; border-radius: 14px; margin-bottom: 10px; line-height: 1.5; }
    .bubble.user { background: #4f46e5; color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
    .bubble.bot  { background: #1e293b; border: 1px solid #334155; border-bottom-left-radius: 4px; }
    .bubble.bot ul { margin: 6px 0 0 0; padding-left: 18px; }
</style>
<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('msg');

    function addBubble(html, who) {
        const div = document.createElement('div');
        div.className = 'bubble ' + who;
        div.innerHTML = html;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function escapeHtml(s) {
        const d = document.createElement('div'); d.innerText = s; return d.innerHTML;
    }

    async function send(text) {
        const q = (text || input.value).trim();
        if (!q) return;
        addBubble(escapeHtml(q), 'user');
        input.value = '';
        addBubble('<span class="text-muted">thinking…</span>', 'bot');
        const thinking = chat.lastChild;
        try {
            const data = await SI.fetchJson('/api/assistant?q=' + encodeURIComponent(q));
            thinking.innerHTML = data.answer || "Sorry, I couldn't find an answer.";
        } catch (e) {
            thinking.innerHTML = '<span class="text-danger">Error contacting the assistant.</span>';
        }
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('sendBtn').addEventListener('click', () => send());
    input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
    document.querySelectorAll('.chip').forEach(c =>
        c.addEventListener('click', () => send(c.innerText)));

    // Greeting on load (bot only)
    (async () => {
        try {
            const data = await SI.fetchJson('/api/assistant?q=help');
            addBubble(data.answer, 'bot');
        } catch (e) { /* ignore */ }
    })();
</script>
</body>
</html>
