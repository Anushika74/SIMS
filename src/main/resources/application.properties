spring.application.name=Smart Inventory Management System

# ===============================================
# MySQL Database Configuration
# -----------------------------------------------
# Create the database first (see database/schema.sql) or rely on
# createDatabaseIfNotExist=true below to auto-create it on first run.
# Update username/password to match your local MySQL server.
# ===============================================
spring.datasource.url=jdbc:mysql://localhost:3306/smart_inventory?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================================
# JPA / Hibernate
# ===============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Server-rendered views read lazy associations (e.g. sale.items) during template
# rendering, so keep the session open for the request.
spring.jpa.open-in-view=true

# ===============================================
# Thymeleaf
# ===============================================
spring.thymeleaf.cache=false

# ===============================================
# Server
# ===============================================
server.port=8080

# ===============================================
# Data seeding
# Set to true to auto-populate 50+ products and 1000+ sales on first run.
# ===============================================
app.seed.enabled=true
app.seed.products=55
app.seed.sales-records=1200
app.seed.history-days=150

# ===============================================
# AI microservice (Python Flask + scikit-learn)
# If the service is unreachable, the app falls back to a built-in
# rule-based AI engine so insights are always available.
# ===============================================
ai.service.base-url=http://localhost:5000
ai.service.enabled=true
ai.service.timeout-ms=4000

# ===============================================
# AI analysis window (days of history analysed)
# ===============================================
app.ai.window-days=90

# ===============================================
# Business thresholds used by the rule-based AI / alert engine
# ===============================================
app.alerts.low-stock-multiplier=1.5
app.alerts.overstock-days=60
app.alerts.dead-stock-days=30
app.alerts.expiry-warning-days=14

# Logging
logging.level.com.smartinventory=INFO
